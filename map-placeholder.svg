<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#33E0FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1000" height="700" fill="#10131A"/>
  <rect x="0" y="0" width="1000" height="700" fill="url(#grid)"/>

  <!-- water -->
  <path d="M 620 700 C 600 600, 680 560, 760 590 C 860 630, 900 700, 900 700 Z" fill="#0B2A33" stroke="#33E0FF" stroke-opacity="0.35" stroke-width="2"/>
  <path d="M 900 700 L 1000 700 L 1000 500 C 950 480, 920 560, 900 700 Z" fill="#0B2A33" stroke="#33E0FF" stroke-opacity="0.35" stroke-width="2"/>

  <!-- hills / outskirts -->
  <path d="M 60 620 L 150 460 L 230 560 L 320 480 L 400 620 Z" fill="none" stroke="#FF7A45" stroke-opacity="0.4" stroke-width="2"/>
  <circle cx="150" cy="460" r="3" fill="#FF7A45" fill-opacity="0.6"/>
  <circle cx="320" cy="480" r="3" fill="#FF7A45" fill-opacity="0.6"/>

  <!-- downtown block cluster -->
  <g stroke="#33E0FF" stroke-opacity="0.45" fill="none" stroke-width="2">
    <rect x="440" y="130" width="70" height="90"/>
    <rect x="520" y="110" width="50" height="120"/>
    <rect x="480" y="240" width="90" height="60"/>
    <rect x="590" y="150" width="60" height="80"/>
    <rect x="420" y="250" width="50" height="50"/>
  </g>

  <!-- industrial district -->
  <g stroke="#FF3E7F" stroke-opacity="0.4" fill="none" stroke-width="2">
    <rect x="700" y="360" width="100" height="70"/>
    <rect x="820" y="400" width="70" height="50"/>
    <rect x="760" y="460" width="120" height="60"/>
  </g>

  <!-- roads -->
  <g stroke="#F4F1EA" stroke-opacity="0.18" stroke-width="3" fill="none">
    <path d="M 0 350 L 1000 350"/>
    <path d="M 500 0 L 500 700"/>
    <path d="M 150 700 L 450 200"/>
    <path d="M 650 700 L 900 350"/>
  </g>

  <!-- compass -->
  <g transform="translate(930,60)">
    <circle r="26" fill="none" stroke="#F4F1EA" stroke-opacity="0.4" stroke-width="1.5"/>
    <path d="M 0 -20 L 6 0 L 0 20 L -6 0 Z" fill="#FF3E7F" fill-opacity="0.85"/>
    <text x="0" y="-32" text-anchor="middle" font-family="monospace" font-size="12" fill="#F4F1EA" fill-opacity="0.6">N</text>
  </g>

  <text x="24" y="676" font-family="monospace" font-size="16" letter-spacing="1" fill="#F4F1EA" fill-opacity="0.35">PLACEHOLDER MAP — SWAP FOR REAL DATA AT LAUNCH</text>
</svg>
