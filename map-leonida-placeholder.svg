<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" width="1000" height="900"> 
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#33E0FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1000" height="900" fill="#0B2A33"/>
  <rect x="0" y="0" width="1000" height="900" fill="url(#grid)"/>

  <!-- Leonida mainland (abstract peninsula, not a real map) -->
  <path d="M 180 60
           C 340 40, 620 50, 720 140
           C 800 210, 760 300, 830 360
           C 900 410, 890 480, 820 520
           C 760 555, 700 560, 660 610
           C 630 650, 640 700, 590 730
           C 540 760, 480 745, 450 700
           C 430 665, 440 620, 400 590
           C 320 530, 220 540, 160 470
           C 100 400, 120 320, 90 250
           C 65 190, 90 110, 180 60 Z"
        fill="#10131A" stroke="#33E0FF" stroke-opacity="0.5" stroke-width="3"/>

  <!-- Grassrivers wetlands texture (south-west interior) -->
  <g stroke="#35D68A" stroke-opacity="0.28" fill="none" stroke-width="1.5">
    <path d="M 220 480 C 260 460, 300 490, 340 470"/>
    <path d="M 210 510 C 255 495, 295 520, 335 500"/>
    <path d="M 230 540 C 270 525, 305 548, 345 530"/>
    <path d="M 250 570 C 285 558, 320 575, 355 560"/>
  </g>

  <!-- Mount Kalaga National Park (north) -->
  <path d="M 300 110 L 350 60 L 400 110 L 440 75 L 480 120 Z" fill="none" stroke="#FF7A45" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Vice City hub (roads + downtown blocks) -->
  <g stroke="#F4F1EA" stroke-opacity="0.2" stroke-width="2.5" fill="none">
    <path d="M 480 260 L 480 480"/>
    <path d="M 380 370 L 600 370"/>
  </g>
  <g stroke="#33E0FF" stroke-opacity="0.55" fill="none" stroke-width="2">
    <rect x="440" y="300" width="45" height="60"/>
    <rect x="495" y="290" width="30" height="80"/>
    <rect x="440" y="375" width="60" height="40"/>
    <rect x="510" y="385" width="40" height="35"/>
  </g>

  <!-- Port Gellhorn (industrial, east coast) -->
  <g stroke="#FF3E7F" stroke-opacity="0.45" fill="none" stroke-width="2">
    <rect x="700" y="330" width="55" height="40"/>
    <rect x="765" y="350" width="40" height="30"/>
  </g>

  <!-- Ambrosia (small inland farm town) -->
  <circle cx="330" cy="330" r="10" fill="none" stroke="#FF7A45" stroke-opacity="0.6" stroke-width="2"/>

  <!-- Leonida Keys chain (south) -->
  <g fill="#0B2A33" stroke="#33E0FF" stroke-opacity="0.5" stroke-width="2">
    <ellipse cx="560" cy="700" rx="26" ry="12"/>
    <ellipse cx="600" cy="730" rx="20" ry="10"/>
    <ellipse cx="632" cy="758" rx="16" ry="8"/>
    <ellipse cx="658" cy="782" rx="13" ry="7"/>
  </g>

  <!-- county divider lines (approximate, unofficial) -->
  <g stroke="#F4F1EA" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="6 6">
    <path d="M 90 250 C 250 300, 350 320, 420 420"/>
    <path d="M 420 420 C 500 470, 480 560, 560 620"/>
  </g>

  <!-- compass -->
  <g transform="translate(920,70)">
    <circle r="26" fill="none" stroke="#F4F1EA" stroke-opacity="0.4" stroke-width="1.5"/>
    <path d="M 0 -20 L 6 0 L 0 20 L -6 0 Z" fill="#FF3E7F" fill-opacity="0.85"/>
    <text x="0" y="-32" text-anchor="middle" font-family="monospace" font-size="12" fill="#F4F1EA" fill-opacity="0.6">N</text>
  </g>

  <text x="24" y="870" font-family="monospace" font-size="16" letter-spacing="1" fill="#F4F1EA" fill-opacity="0.4">COMMUNITY-ESTIMATED LAYOUT — NOT AN OFFICIAL ROCKSTAR MAP</text>
</svg>
